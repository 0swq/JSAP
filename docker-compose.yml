services:
  backend:
    build:
      context: ./servidor
      dockerfile: dockerfile
    ports:
      - "3002:3002"
    env_file:
      - ./servidor/.env
    restart: always
  frontend:
    build:
      context: ./cliente
      dockerfile: dockerfile
    ports:
      - "8082:80"
    restart: always
    depends_on:
      - backend
